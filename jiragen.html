<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jira Ticket Generator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #FAFBFC;
      color: #172B4D;
      margin: 0;
      padding: 40px 20px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background-color: #FFFFFF;
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(9, 30, 66, 0.05), 0 0 1px rgba(9, 30, 66, 0.1);
    }
    h2 {
      margin-top: 0;
      padding-bottom: 15px;
      border-bottom: 2px solid #DEEBFF;
      color: #172B4D;
    }
    .input-group {
      margin-bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .input-group label {
      font-weight: 600;
      font-size: 13px;
      color: #5E6C84;
    }
    .input-group input {
      padding: 8px 12px;
      font-size: 14px;
      background-color: #FAFBFC;
      border: 2px solid #DFE1E6;
      border-radius: 3px;
      max-width: 300px;
      color: #172B4D;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .input-group input:focus {
      outline: none;
      border-color: #4C9AFF;
      background-color: #FFFFFF;
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 25px;
      background-color: #FFFFFF;
      padding: 20px;
      border: 1px solid #DFE1E6;
      border-radius: 4px;
    }
    .settings-grid .input-group {
      margin-bottom: 0;
    }
    .task-list {
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .task-item label {
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      border-radius: 4px;
      transition: background-color 0.2s;
    }
    .task-item label:hover {
      background-color: #DEEBFF;
    }
    .task-item input[type="checkbox"] {
      margin-top: 4px;
      accent-color: #0052CC;
    }
    .task-text {
      display: flex;
      flex-direction: column;
    }
    .task-summary {
      font-weight: 600;
      color: #172B4D;
      margin-bottom: 4px;
    }
    .task-desc {
      font-size: 0.9em;
      color: #5E6C84;
    }
    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 25px;
      margin-bottom: 5px;
      border-bottom: 2px solid #dfe1e6;
      padding-bottom: 8px;
    }
    .stage-header h3 {
      margin: 0;
      color: #0052CC;
      font-size: 18px;
    }
    .stage-header input {
      padding: 6px 12px;
      background-color: #FAFBFC;
      border: 2px solid #DFE1E6;
      border-radius: 3px;
      font-size: 14px;
      color: #172B4D;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .stage-header input:focus {
      outline: none;
      border-color: #4C9AFF;
      background-color: #FFFFFF;
    }
    .stage-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .stage-btn {
      padding: 6px 12px;
      font-size: 12px;
      background-color: #DEEBFF;
      color: #0052CC;
    }
    .stage-btn:hover {
      background-color: #B3D4FF;
    }
    .deselect-btn {
      background-color: #F4F5F7;
      color: #42526E;
    }
    .deselect-btn:hover {
      background-color: #DFE1E6;
    }
    button {
      padding: 10px 20px;
      background-color: #0052CC; /* Atlassian Blue */
      color: white;
      border: none;
      border-radius: 3px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }
    button:hover {
      background-color: #0047B3;
    }
    .global-deselect-btn {
      background-color: #F4F5F7 !important;
      color: #42526E !important;
    }
    .global-deselect-btn:hover {
      background-color: #DFE1E6 !important;
    }
    .action-bar {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #DEEBFF;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>FPGA Verification Task Generator</h2>
  
  <div class="settings-grid">
    <div class="input-group">
      <label for="moduleName">FPGA Module Name:</label>
      <input type="text" id="moduleName" placeholder="e.g. axi_interconnect">
    </div>
    <div class="input-group">
      <label for="issueType">Type (Story or Bug):</label>
      <input type="text" id="issueType" value="Story">
    </div>
    <div class="input-group">
      <label for="priority">Priority:</label>
      <input type="text" id="priority" value="Medium">
    </div>
    <div class="input-group">
      <label for="component">Component:</label>
      <input type="text" id="component" value="FW">
    </div>
    <div class="input-group">
      <label for="epicLink">Epic Link:</label>
      <input type="text" id="epicLink" placeholder="e.g. PROJ-123">
    </div>
    <div class="input-group">
      <label for="sprint">Sprint:</label>
      <input type="text" id="sprint" placeholder="e.g. Sprint 1">
    </div>
    <div class="input-group">
      <label for="chargeNumber">Charge Number:</label>
      <input type="text" id="chargeNumber" placeholder="e.g. 12345-67">
    </div>
    <div class="input-group">
      <label for="assignee">Assignee:</label>
      <input type="text" id="assignee" placeholder="e.g. tristen.hallock (JIRA username)">
    </div>
    <div class="input-group">
      <label for="programActivity">Program Activity:</label>
      <input type="text" id="programActivity" placeholder="e.g. Verification">
    </div>
    <div class="input-group">
      <label for="labels">Labels:</label>
      <input type="text" id="labels" placeholder="e.g. fpga, verification">
    </div>
    <div class="input-group">
      <label for="fixVersions">Fix Version/s:</label>
      <input type="text" id="fixVersions" placeholder="e.g. 1.0.0">
    </div>
  </div>

  <div style="margin-bottom: 15px; display: flex; gap: 10px;">
    <button onclick="selectAllTasks()">Select All</button>
    <button onclick="deselectAllTasks()" class="global-deselect-btn">Deselect All</button>
  </div>

  <div class="task-list" id="taskList">
    <!-- Checkboxes are injected here by JavaScript -->
  </div>
  
  <div class="action-bar">
    <button onclick="generateCSV()">Download Jira CSV</button>
  </div>
</div>

  <script>
    // 1. Define your Jira templates here
    // Use {{MODULE}} as a placeholder for the block name
    const taskTemplates = [
      { id: 't1', stage: 'Stage 1', summary: '{{MODULE}}: Initial FVP/FCVP', description: 'Draft the initial Functional Verification Plan (FVP) and Functional Coverage Verification Plan (FCVP) for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '1', acceptanceCriteria: 'FVP/FCVP is published to GitLab Repo' },
      { id: 't2', stage: 'Stage 1', summary: '{{MODULE}}: Initial Environment Diagrams', description: 'Create the initial environment diagrams for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '1', acceptanceCriteria: 'Initial Environment Diagrams are published to GitLab Repo' },
      { id: 't3', stage: 'Stage 2', summary: '{{MODULE}}: Create Test Harness', description: 'Create the test harness for {{MODULE}} verification.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Test Harness is published to GitLab repo' },
      { id: 't4', stage: 'Stage 2', summary: '{{MODULE}}: Add relevant assertions', description: 'Add relevant assertions for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Relevant assertion bindmodules are added to test harness and published to GitLab repo' },
      { id: 't5', stage: 'Stage 3', summary: '{{MODULE}}: Initial environment and configs', description: 'Create initial environment and configs for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'UVM Environment and Environment Config is published to GitLab repo' },
      { id: 't6', stage: 'Stage 3', summary: '{{MODULE}}: Add Clock and Reset Agents', description: 'Add Clock and Reset agents for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '2', acceptanceCriteria: 'Clock and Reset agents are added to the UVM Environment and published to the GitLab repo' },
      { id: 't7', stage: 'Stage 3', summary: '{{MODULE}}: Add Control Path Agents', description: 'Add Control Path agents for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '2', acceptanceCriteria: 'Control path agents are added to the UVM verification environment and published to the GitLab repo' },
      { id: 't8', stage: 'Stage 3', summary: '{{MODULE}}: Add Data Path Agents', description: 'Add Data Path agents for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '2', acceptanceCriteria: 'Data path agents are added to the UVM verification environment and published to the GitLab repo' },
      { id: 't9', stage: 'Stage 3', summary: '{{MODULE}}: Add Custom Agents', description: 'Add Custom agents for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Custom agents are added to the UVM verification environment and published to the GitLab repo' },
      { id: 't10', stage: 'Stage 3', summary: '{{MODULE}}: Create UVM Base test', description: 'Create UVM Base test for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'UVM Base test for {{MODULE}} block is published to the GitLab repo and pass through the pipeline' },
      { id: 't11', stage: 'Stage 3', summary: '{{MODULE}}: Create additional testcases', description: 'Create additional testcases for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'Additional testcases are extended from the base test and published to the GitLab Repo and pass through the pipeline' },
      { id: 't12', stage: 'Stage 3', summary: '{{MODULE}}: Create Base Sequences', description: 'Create Base Sequences for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'UVM base sequences are published to the GitLab repo' },
      { id: 't13', stage: 'Stage 3', summary: '{{MODULE}}: Run Relevant Builtin Tests', description: 'Run Relevant Builtin Tests for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '1', acceptanceCriteria: 'Builtin Tests are published to the GitLab repo and pass through the pipeline' },
      { id: 't14', stage: 'Stage 3', summary: '{{MODULE}}: Create UVM scoreboard', description: 'Create UVM scoreboard for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'UVM scoreboard is published to GitLab repo' },
      { id: 't15', stage: 'Stage 4', summary: '{{MODULE}}: Write Coverage Collectors', description: 'Write coverage collectors for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Coverage collectors are published to the GitLab repo and run through the CI/CD pipeline' },
      { id: 't16', stage: 'Stage 4', summary: '{{MODULE}}: Write Functional Coverage', description: 'Write functional coverage for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'Functional coverage is published to the GitLab repo and runs through the CI/CD pipeline' },
      { id: 't17', stage: 'Stage 5', summary: '{{MODULE}}: Make testplan', description: 'Make testplan for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Testplan is published to the GitLab repo and runs through the CI/CD pipeline' },
      { id: 't18', stage: 'Stage 5', summary: '{{MODULE}}: Link Coverage to testplan', description: 'Link Coverage to testplan for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Coverage linked to testplan is published to the GitLab repo and runs through the CI/CD pipeline' },
      { id: 't19', stage: 'Stage 5', summary: '{{MODULE}}: Write directed tests', description: 'Write directed tests for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'Directed tests are published to the GitLab repo and run through the CI/CD pipeline' },
      { id: 't20', stage: 'Stage 5', summary: '{{MODULE}}: Create Regression target', description: 'Create Regression target for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '1', acceptanceCriteria: 'Regression target is published to the GitLab repo and runs through the CI/CD pipeline' },
      { id: 't21', stage: 'Stage 5', summary: '{{MODULE}}: Resolve Regression Failures', description: 'Resolve Regression Failures for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '5', acceptanceCriteria: 'Test suite specified in the test list file runs through the CI/CD pipeline collecting coverage without failures' },
      { id: 't22', stage: 'Stage 6', summary: '{{MODULE}}: Merge Coverage Metrics with Testplan', description: 'Merge Coverage Metrics with Testplan for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Merged coverage metrics are published to the GitLab repo and run through the CI/CD pipeline' },
      { id: 't23', stage: 'Stage 6', summary: '{{MODULE}}: Create Pipeline job for Coverage reports', description: 'Create Pipeline job for Coverage reports for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Coverage is collected through pipeline regression and published to GitLab Pages or Package Registry' },
      { id: 't24', stage: 'Stage 6', summary: '{{MODULE}}: Evaluate Testplan', description: 'Evaluate Testplan for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '1', acceptanceCriteria: 'Testplan verifies all requirements in FCDD.' },
      { id: 't25', stage: 'Stage 7', summary: '{{MODULE}}: Update FVP/FCVP', description: 'Finalize FVP/FCVP for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'FVP/FCVP are updated to reflect the full functionality of the {{MODULE}} block and published to the documents/ directory in the GitLab repo.' },
      { id: 't26', stage: 'Stage 7', summary: '{{MODULE}}: Merge Verification Branch', description: 'Merge Verification Branch for {{MODULE}}.', issueType: 'Story', priority: 'Medium', storyPoints: '3', acceptanceCriteria: 'Verification work is merged to Develop/Main after completing a merge request' }
    ];

    // 2. Render the tasks to the UI grouped by stages
    const taskListDiv = document.getElementById('taskList');
    
    // Group tasks by stage
    const tasksByStage = {};
    taskTemplates.forEach(task => {
      if (!tasksByStage[task.stage]) {
        tasksByStage[task.stage] = [];
      }
      tasksByStage[task.stage].push(task);
    });

    // Render grouped tasks
    Object.keys(tasksByStage).forEach(stage => {
      const stageHeader = document.createElement('div');
      stageHeader.className = 'stage-header';
      
      const stageTitle = document.createElement('h3');
      stageTitle.textContent = stage;

      const controlsDiv = document.createElement('div');
      controlsDiv.className = 'stage-controls';

      const stageSprintInput = document.createElement('input');
      stageSprintInput.type = 'text';
      stageSprintInput.placeholder = 'Sprint (overrides default)';
      stageSprintInput.id = `sprint-${stage.replace(/\s+/g, '-')}`;

      const selectAllBtn = document.createElement('button');
      selectAllBtn.textContent = 'Select All';
      selectAllBtn.className = 'stage-btn';
      selectAllBtn.onclick = () => document.querySelectorAll(`input[data-stage="${stage}"]`).forEach(cb => cb.checked = true);

      const deselectAllBtn = document.createElement('button');
      deselectAllBtn.textContent = 'Deselect All';
      deselectAllBtn.className = 'stage-btn deselect-btn';
      deselectAllBtn.onclick = () => document.querySelectorAll(`input[data-stage="${stage}"]`).forEach(cb => cb.checked = false);

      controlsDiv.appendChild(stageSprintInput);
      controlsDiv.appendChild(selectAllBtn);
      controlsDiv.appendChild(deselectAllBtn);

      stageHeader.appendChild(stageTitle);
      stageHeader.appendChild(controlsDiv);
      taskListDiv.appendChild(stageHeader);

      tasksByStage[stage].forEach(task => {
        const div = document.createElement('div');
        div.className = 'task-item';
        
        // Display generic "[Module]" text in the UI to keep it clean
        const displaySummary = task.summary.replace(/\{\{MODULE\}\}/g, '[Module]');
        const displayDesc = task.description.replace(/\{\{MODULE\}\}/g, '[Module]');

        div.innerHTML = `
          <label>
            <input type="checkbox" value="${task.id}" id="${task.id}" data-stage="${stage}">
            <div class="task-text">
              <span class="task-summary">${displaySummary}</span>
              <span class="task-desc">${displayDesc}</span>
            </div>
          </label>
        `;
        taskListDiv.appendChild(div);
      });
    });

    // 3. Handle the CSV generation and download
    function generateCSV() {
      const moduleInput = document.getElementById('moduleName').value.trim();
      const typeInput = document.getElementById('issueType').value.trim();
      const priorityInput = document.getElementById('priority').value.trim();
      const componentInput = document.getElementById('component').value.trim();
      const epicLinkInput = document.getElementById('epicLink').value.trim();
      const sprintInput = document.getElementById('sprint').value.trim();
      const chargeNumberInput = document.getElementById('chargeNumber').value.trim();
      const assigneeInput = document.getElementById('assignee').value.trim();
      const programActivityInput = document.getElementById('programActivity').value.trim();
      const labelsInput = document.getElementById('labels').value.trim();
      const fixVersionsInput = document.getElementById('fixVersions').value.trim();
      
      if (!moduleInput) {
        alert('Please enter an FPGA Module Name.');
        return;
      }

      // Get all checked boxes
      const selectedIds = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(cb => cb.value);
      const selectedTasks = taskTemplates.filter(task => selectedIds.includes(task.id));

      if (selectedTasks.length === 0) {
        alert('Please select at least one task to generate a CSV.');
        return;
      }

      // Define standard Jira headers
      const headers = [
        'Summary', 'Description', 'Issue Type', 'Priority', 'Component',
        'Epic Link', 'Story Points', 'Acceptance Criteria', 'Sprint', 'Charge Number',
        'Assignee', 'Program Activity', 'Labels', 'Fix Version/s'
      ];
      let csvContent = headers.join(',') + '\n';
      
      selectedTasks.forEach(task => {
        // Replace placeholders with actual module name
        const resolvedSummary = task.summary.replace(/\{\{MODULE\}\}/g, moduleInput);
        const resolvedDesc = task.description.replace(/\{\{MODULE\}\}/g, moduleInput);

        // Use global inputs if provided, otherwise fallback to template data
        const finalType = typeInput || task.issueType || 'Story';
        const finalPriority = priorityInput || task.priority || 'Medium';
        const finalSP = task.storyPoints || '';
        const finalAC = task.acceptanceCriteria || '';
        
        const stageSprintInputVal = document.getElementById(`sprint-${task.stage.replace(/\s+/g, '-')}`)?.value.trim();
        const finalSprint = stageSprintInputVal || sprintInput;

        // Safely escape strings for CSV format (wrap in quotes, replace inner quotes with double quotes)
        const escapeCSV = (str) => `"${(str || '').toString().replace(/"/g, '""')}"`;
        
        const row = [
          escapeCSV(resolvedSummary),
          escapeCSV(resolvedDesc),
          escapeCSV(finalType),
          escapeCSV(finalPriority),
          escapeCSV(componentInput),
          escapeCSV(epicLinkInput),
          escapeCSV(finalSP),
          escapeCSV(finalAC),
          escapeCSV(finalSprint),
          escapeCSV(chargeNumberInput),
          escapeCSV(assigneeInput),
          escapeCSV(programActivityInput),
          escapeCSV(labelsInput),
          escapeCSV(fixVersionsInput)
        ];
        
        csvContent += row.join(',') + '\n';
      });

      // Create a Blob and trigger the download
      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.setAttribute('href', url);
      link.setAttribute('download', `${moduleInput}_verification_tasks.csv`);
      
      // Invisible appending to satisfy Firefox requirements
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function selectAllTasks() {
      document.querySelectorAll('#taskList input[type="checkbox"]').forEach(cb => cb.checked = true);
    }

    function deselectAllTasks() {
      document.querySelectorAll('#taskList input[type="checkbox"]').forEach(cb => cb.checked = false);
    }
  </script>
</body>
</html>
